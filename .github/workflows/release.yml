name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app
        run: |
          xcodebuild \
            -project NetworkPanel.xcodeproj \
            -scheme NetworkPanel \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Create unsigned IPA
        run: |
          APP_PATH="$(find DerivedData/Build/Products/Release-iphoneos -name 'NetworkPanel.app' -type d | head -n 1)"
          test -n "$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r network-panel-ios-${{ github.ref_name }}-unsigned.ipa Payload

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: network-panel-ios-${{ github.ref_name }}-unsigned.ipa
          name: network-panel-ios ${{ github.ref_name }}
          body: |
            Native SwiftUI build for iPhone and iPad.

            Asset:
            - network-panel-ios-${{ github.ref_name }}-unsigned.ipa

            This IPA is unsigned. Use your own self-signing or sideloading tool before installing it on iPhone or iPad.
