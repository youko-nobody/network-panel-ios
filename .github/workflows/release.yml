name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -project NetworkPanel.xcodeproj \
            -scheme NetworkPanel \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build 2>&1 | tee xcodebuild.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            tail -n 160 xcodebuild.log > xcodebuild-tail.log
            echo "===== XCODEBUILD LOG TAIL START ====="
            cat xcodebuild-tail.log
            echo "===== XCODEBUILD LOG TAIL END ====="
            exit "$status"
          fi

      - name: Create unsigned IPA
        run: |
          APP_PATH="$(find DerivedData/Build/Products/Release-iphoneos -name 'NetworkPanel.app' -type d | head -n 1)"
          test -n "$APP_PATH"
          bash scripts/prepare_ipa_assets.sh "$APP_PATH"
          /usr/libexec/PlistBuddy -c "Print CFBundleDisplayName" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print CFBundleName" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print UIDeviceFamily" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print UIRequiresFullScreen" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print UIBackgroundModes" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print CFBundleIcons" "$APP_PATH/Info.plist"
          test -f "$APP_PATH/AppIcon60x60@3x.png"
          test -f "$APP_PATH/AppIcon76x76@2x~ipad.png"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r network-panel-ios-${{ github.ref_name }}-unsigned.ipa Payload

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: network-panel-ios-${{ github.ref_name }}-unsigned.ipa
          name: 网络面板 iOS ${{ github.ref_name }}
          body: |
            网络面板 iPhone / iPad 原生 SwiftUI 网络工具。

            主要功能：
            - 实时显示 MB/s 与 Mbps
            - 统计累计用量和本次会话用量
            - 管理测试线路与并发线程
            - 支持速率上限设置
            - 检测地区延迟与连接质量
            - 支持多主题、iPad 横屏、分屏和多窗口

            下载文件：
            - network-panel-ios-${{ github.ref_name }}-unsigned.ipa

            这是未签名 IPA，请使用你自己的自签或侧载工具签名后安装到 iPhone / iPad。

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
