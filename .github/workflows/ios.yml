name: iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -project NetworkPanel.xcodeproj \
            -scheme NetworkPanel \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee xcodebuild.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            tail -n 160 xcodebuild.log > xcodebuild-tail.log
            {
              echo "::error title=Xcode build failed::Last 160 lines of xcodebuild.log follow."
              sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/g' xcodebuild-tail.log | tr -d '\n'
              echo
            }
            exit "$status"
          fi

      - name: Create unsigned IPA
        run: |
          APP_PATH="$(find DerivedData/Build/Products/Release-iphoneos -name 'NetworkPanel.app' -type d | head -n 1)"
          test -n "$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r NetworkPanel-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkPanel-unsigned
          path: NetworkPanel-unsigned.ipa

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
