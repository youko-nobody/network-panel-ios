name: NetworkPanel
options:
  bundleIdPrefix: cn.netart.networkpanel
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    PRODUCT_BUNDLE_IDENTIFIER: cn.netart.networkpanel.ios
    MARKETING_VERSION: 0.1.27
    CURRENT_PROJECT_VERSION: 28
targets:
  NetworkPanel:
    type: application
    platform: iOS
    sources:
      - path: NetworkPanel/App
      - path: NetworkPanel/Models
      - path: NetworkPanel/Services
      - path: NetworkPanel/Views
      - path: NetworkPanel/Resources/Assets.xcassets
    info:
      path: NetworkPanel/Resources/Info.plist
      properties:
        CFBundleDisplayName: 网络面板
        CFBundleName: 网络面板
        CFBundleDevelopmentRegion: zh_CN
        CFBundleIconName: AppIcon
        UIDeviceFamily:
          - 1
          - 2
        UIBackgroundModes:
          - audio
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
    settings:
      base:
        INFOPLIST_FILE: NetworkPanel/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
schemes:
  NetworkPanel:
    build:
      targets:
        NetworkPanel: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
