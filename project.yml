name: NetworkPanel
options:
  bundleIdPrefix: cn.netart.networkpanel
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    PRODUCT_BUNDLE_IDENTIFIER: cn.netart.networkpanel.ios
    MARKETING_VERSION: 0.1.6
    CURRENT_PROJECT_VERSION: 7
targets:
  NetworkPanel:
    type: application
    platform: iOS
    sources:
      - path: NetworkPanel/App
      - path: NetworkPanel/Models
      - path: NetworkPanel/Services
      - path: NetworkPanel/Views
    resources:
      - path: NetworkPanel/Resources/Assets.xcassets
    info:
      path: NetworkPanel/Resources/Info.plist
      properties:
        CFBundleDisplayName: Network Panel
        CFBundleName: NetworkPanel
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
    settings:
      base:
        INFOPLIST_FILE: NetworkPanel/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
schemes:
  NetworkPanel:
    build:
      targets:
        NetworkPanel: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
