name: NetworkPanel
options:
  bundleIdPrefix: cn.netart.networkpanel
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    PRODUCT_BUNDLE_IDENTIFIER: cn.netart.networkpanel.ios
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  NetworkPanel:
    type: application
    platform: iOS
    sources:
      - path: NetworkPanel
    resources:
      - path: NetworkPanel/Resources
    info:
      path: NetworkPanel/Resources/Info.plist
      properties:
        CFBundleDisplayName: Network Panel
        CFBundleName: NetworkPanel
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: ""
    settings:
      base:
        INFOPLIST_FILE: NetworkPanel/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: NO